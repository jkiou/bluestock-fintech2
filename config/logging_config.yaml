version: 1
disable_existing_loggers: false
formatters:
  simple:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: simple
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    level: DEBUG
    formatter: simple
    filename: app.log
    encoding: utf8
loggers:
  etl:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  analytics:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  api:
    level: DEBUG
    handlers: [console, file]
    propagate: false
root:
  level: INFO
  handlers: [console, file]
