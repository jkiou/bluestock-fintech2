# ==============================================================================
# Nifty 100 Financial Intelligence Platform - Screener Configuration
# ==============================================================================

presets:
  quality_compounder:
    name: "Quality Compounder"
    description: "High return on equity, low leverage, positive free cash flow, and steady revenue growth."
    filters:
      roe_percentage:
        operator: ">"
        value: 15.0
      debt_to_equity:
        operator: "<"
        value: 1.0
      free_cash_flow_cr:
        operator: ">"
        value: 0.0
      revenue_cagr_5yr:
        operator: ">"
        value: 10.0
    ranking_metric: "composite_score"
    ranking_order: "desc"

  value_pick:
    name: "Value Pick"
    description: "Low valuation multiples, reasonable leverage, and solid dividend yield."
    filters:
      pe_ratio:
        operator: "<"
        value: 20.0
      pb_ratio:
        operator: "<"
        value: 3.0
      debt_to_equity:
        operator: "<"
        value: 2.0
      dividend_yield_pct:
        operator: ">"
        value: 1.0
    ranking_metric: "fcf_yield"
    ranking_order: "desc"

  growth_accelerator:
    name: "Growth Accelerator"
    description: "Rapidly growing profit and revenue, with sustainable debt levels."
    filters:
      pat_cagr_5yr:
        operator: ">"
        value: 20.0
      revenue_cagr_5yr:
        operator: ">"
        value: 15.0
      debt_to_equity:
        operator: "<"
        value: 2.0
    ranking_metric: "pat_cagr_5yr"
    ranking_order: "desc"

  dividend_champion:
    name: "Dividend Champion"
    description: "High dividend yield, sustainable payout ratios, and positive free cash flow."
    filters:
      dividend_yield_pct:
        operator: ">"
        value: 2.0
      dividend_payout_ratio_pct:
        operator: "<"
        value: 80.0
      free_cash_flow_cr:
        operator: ">"
        value: 0.0
    ranking_metric: "dividend_yield_pct"
    ranking_order: "desc"

  debt_free_blue_chip:
    name: "Debt-Free Blue Chip"
    description: "Zero debt, strong returns, and substantial revenue size."
    filters:
      debt_to_equity:
        operator: "=="
        value: 0.0
      roe_percentage:
        operator: ">"
        value: 12.0
      sales:
        operator: ">"
        value: 5000.0 # 5000 Crore
    ranking_metric: "roe_percentage"
    ranking_order: "desc"

  turnaround_watch:
    name: "Turnaround Watch"
    description: "Recovering revenue growth, improving cash flows, and reducing debt."
    filters:
      revenue_cagr_3yr:
        operator: ">"
        value: 10.0
      fcf_improving:
        operator: "=="
        value: true
      debt_declining:
        operator: "=="
        value: true
    ranking_metric: "revenue_cagr_3yr"
    ranking_order: "desc"
